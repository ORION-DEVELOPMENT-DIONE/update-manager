---
- name: Orion Device Auto-Provisioning
  hosts: localhost
  connection: local
  become: yes

  vars:
    device_hostname: "{{ ansible_hostname }}"

  pre_tasks:
    - name: Fix Jinja2 compatibility issue
      pip:
        name: jinja2
        version: "3.1.5"
        executable: pip3
        extra_args: --force-reinstall
      ignore_errors: yes
      tags: always

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: always

    - name: Install required packages
      apt:
        name:
          - git
          - python3
          - python3-pip
          - curl
          - jq
        state: present
      tags: always

  roles:
    - role: local-secrets
      tags: always

    - role: network-config
      tags: network

    - role: tailscale-auth
      tags: tailscale
      when: tailscale_oauth_client_id is defined

    - role: tailscale
      tags: tailscale
      when: tailscale_oauth_client_id is defined

    - role: influxdb
      tags: influxdb

    - role: grafana
      tags: grafana

    - role: screen-manager
      tags: screen-manager

    - role: auto-update
      tags: auto-update

  post_tasks:
    - name: Log provisioning completion
      shell: |
        echo "$(date): Provisioning completed successfully" >> /var/log/orion-provisioning.log
      tags: always

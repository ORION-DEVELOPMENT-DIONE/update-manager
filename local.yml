---
- name: Orion Device Auto-Provisioning
  hosts: localhost
  connection: local
  become: yes

  vars:
    device_hostname: "{{ ansible_hostname }}"

  pre_tasks:
    - name: Check Jinja2 version
      shell: python3 -c "import jinja2; print(jinja2.__version__)"
      register: jinja2_version
      changed_when: false
      failed_when: false
      tags: always

    - name: Fix Jinja2 compatibility issue
      pip:
        name: jinja2
        version: "3.1.5"
        executable: pip3
        extra_args: --force-reinstall
      when: jinja2_version.stdout | default('') != '3.1.5'
      ignore_errors: yes
      tags: always
      
    # - name: Remove incompatible Jinja2 plugins
    #   file:
    #     path: "{{ item }}"
    #     state: absent
    #   loop:
    #     - /usr/lib/python3/dist-packages/ansible/plugins/filter/core.py
    #     - /usr/lib/python3/dist-packages/ansible/plugins/filter/mathstuff.py
    #   ignore_errors: yes
    #   tags: always

    # - name: Fix Jinja2 compatibility issue
    #   pip:
    #     name: jinja2
    #     version: "3.1.5"
    #     executable: pip3
    #     extra_args: --force-reinstall
    #   ignore_errors: yes
    #   tags: always

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      tags: always

    - name: Install required packages
      apt:
        name:
          - git
          - python3
          - python3-pip
          - curl
          - jq
        state: present
      tags: always

  roles:
    - role: local-secrets
      tags: always

    - role: network-config
      tags: network

    - role: tailscale-auth
      tags: tailscale
      when: tailscale_oauth_client_id is defined

    - role: tailscale
      tags: tailscale
      when: tailscale_oauth_client_id is defined

    - role: influxdb
      tags: influxdb

    - role: grafana
      tags: grafana

    - role: screen-manager
      tags: screen-manager

    - role: auto-update
      tags: auto-update

  post_tasks:
    - name: Log provisioning completion
      shell: |
        echo "$(date): Provisioning completed successfully" >> /var/log/orion-provisioning.log
      tags: always

---
- name: Ensure ansible-pull cronjob is installed
  cron:
    name: "Orion auto-update"
    user: orangepi
    job: "ansible-pull -U https://github.com/ORION-DEVELOPMENT-DIONE/update-manager.git local.yml -i localhost -o"
    hour: 0
    minute: 0

- name: Create ansible-pull log file
  file:
    path: /var/log/ansible-pull.log
    state: touch
    owner: root
    group: root
    mode: '0644'

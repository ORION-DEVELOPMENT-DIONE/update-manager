---
- name: Ensure dependencies installed
  apt:
    name:
      - git
      - python3-pip
    state: present
    update_cache: yes

- name: Ensure orangepi user is in required groups for hardware access
  user:
    name: "{{ app_user }}"
    groups: spi,i2c,dialout
    append: yes

- name: Check if .git directory has wrong ownership
  stat:
    path: "{{ app_dir }}/.git"
  register: git_dir_stat

- name: Remove entire screen-manager if .git has permission issues
  file:
    path: "{{ app_dir }}"
    state: absent
  when: 
    - git_dir_stat.stat.exists
    - git_dir_stat.stat.pw_name == 'root'

- name: Clone or update Screen Manager repo
  become_user: "{{ app_user }}"
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: development
    force: yes
  register: git_result

- name: Ensure logs directory exists
  file:
    path: "{{ app_dir }}/logs"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create logs .gitkeep file
  file:
    path: "{{ app_dir }}/logs/.gitkeep"
    state: touch
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

- name: Update .version file to current git commit
  shell: git rev-parse --short HEAD > {{ app_dir }}/.version
  args:
    chdir: "{{ app_dir }}"
  become_user: "{{ app_user }}"

- name: Display current version
  shell: cat {{ app_dir }}/.version
  register: version_output
  changed_when: false

- name: Show installed version
  debug:
    msg: "Screen Manager version: {{ version_output.stdout }}"

- name: Check if requirements.txt exists
  stat:
    path: "{{ app_dir }}/requirements.txt"
  register: requirements_file

- name: Install Python dependencies if requirements exists
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    executable: pip3
  when: requirements_file.stat.exists
  ignore_errors: yes

- name: Ensure correct ownership
  file:
    path: "{{ app_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Install systemd service file for screen
  copy:
    src: screen.service
    dest: /etc/systemd/system/screen.service
    owner: root
    group: root
    mode: '0644'

- name: Reload systemd
  systemd:
    daemon_reload: yes

- name: Enable and restart screen service
  systemd:
    name: screen.service
    enabled: yes
    state: restarted

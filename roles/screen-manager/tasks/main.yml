---
- name: Ensure dependencies installed
  apt:
    name:
      - git
      - python3-pip
    state: present
    update_cache: yes

- name: Check if screen-manager directory exists
  stat:
    path: "{{ app_dir }}"
  register: screen_manager_dir

- name: Clone Screen Manager repo if it doesn't exist
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: development
    force: yes
  when: not screen_manager_dir.stat.exists
  register: git_clone

- name: Log update status
  debug:
    msg: "Screen Manager status: {{ update_status.stdout | default('Newly installed') }}"
  when: screen_manager_dir.stat.exists

- name: Ensure logs directory exists
  file:
    path: "{{ app_dir }}/logs"
    state: directory
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0755'

- name: Create logs .gitkeep file
  file:
    path: "{{ app_dir }}/logs/.gitkeep"
    state: touch
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    mode: '0644'

#- name: Update .version file to current git commit
#  shell: git rev-parse --short HEAD > {{ app_dir }}/.version
#  args:
#    chdir: "{{ app_dir }}"
#  become_user: "{{ app_user }}"

- name: Display current version
  shell: cat {{ app_dir }}/.version
  register: version_output
  changed_when: false

- name: Show installed version
  debug:
    msg: "Screen Manager version: {{ version_output.stdout }}"

- name: Check if requirements.txt exists
  stat:
    path: "{{ app_dir }}/requirements.txt"
  register: requirements_file

- name: Install Python dependencies if requirements exists
  pip:
    requirements: "{{ app_dir }}/requirements.txt"
    executable: pip3
  when: requirements_file.stat.exists
  ignore_errors: yes

- name: Fix ownership to prevent git permission issues
  file:
    path: "{{ app_dir }}"
    owner: "{{ app_user }}"
    group: "{{ app_user }}"
    recurse: yes

- name: Install systemd service file for screen
  copy:
    src: screen.service
    dest: /etc/systemd/system/screen.service
    owner: root
    group: root
    mode: '0644'
  register: service_file

- name: Reload systemd if service file changed
  systemd:
    daemon_reload: yes
  when: service_file is changed

- name: Enable and start screen service
  systemd:
    name: screen.service
    enabled: yes
    state: started

- name: Restart screen service only if service file changed
  systemd:
    name: screen.service
    state: restarted
  when: service_file is changed

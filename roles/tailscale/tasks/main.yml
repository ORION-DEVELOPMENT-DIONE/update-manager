---
- name: Check if Tailscale is already installed
  stat:
    path: /usr/bin/tailscale
  register: tailscale_binary

- name: Add Tailscale GPG key
  apt_key:
    url: https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmored.gpg
    state: present
  when: not tailscale_binary.stat.exists

- name: Add Tailscale repository
  apt_repository:
    repo: deb https://pkgs.tailscale.com/stable/ubuntu jammy main
    state: present
    filename: tailscale
  when: not tailscale_binary.stat.exists

- name: Install Tailscale
  apt:
    name: tailscale
    state: present
    update_cache: yes

- name: Start and enable Tailscale daemon
  systemd:
    name: tailscaled
    state: started
    enabled: yes

- name: Check Tailscale connection status
  command: tailscale status --json
  register: tailscale_status
  failed_when: false
  changed_when: false

- name: Connect to Tailscale network using auth key from file
  shell: |
    AUTH_KEY=$(cat /etc/tailscale/auth_key | tr -d '\n')
    tailscale up --reset --auth-key="$AUTH_KEY" --hostname={{ tailscale_hostname }} --accept-routes
  when: 
    - tailscale_status.rc != 0 or 'BackendState":"Running"' not in tailscale_status.stdout
  register: tailscale_join
  failed_when: 
    - tailscale_join.rc != 0
    - '"is already in use" not in tailscale_join.stderr'
  no_log: true

- name: Verify Tailscale is connected
  command: tailscale status
  register: tailscale_verify
  changed_when: false
  failed_when: false

- name: Display Tailscale status
  debug:
    msg: "{{ tailscale_verify.stdout_lines }}"
